version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hotdeal-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotdeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotdeal_password}
      POSTGRES_DB: ${POSTGRES_DB:-hotdeal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotdeal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotdeal-bot
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 로그 파일을 호스트에 저장하려면 주석 해제
      # - ./logs:/app/logs

volumes:
  postgres_data:
