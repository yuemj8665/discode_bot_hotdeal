apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hotdeal-bot-dev

namePrefix: dev-

resources:
  - ../../base

# 이미지 태그 오버라이드 (날짜_시간분 형식)
images:
  - name: hotdeal-bot
    newName: hotdeal-bot
    newTag: "20260316_0030"

# ConfigMap 패치 (개발 환경 설정)
configMapGenerator:
  - name: hotdeal-bot-config
    behavior: merge
    literals:
      - APP_ENV=dev
      - LOG_LEVEL=DEBUG

# 레플리카 수 조정
replicas:
  - name: hotdeal-bot
    count: 1
