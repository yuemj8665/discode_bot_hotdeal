apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotdeal-bot
  labels:
    app: hotdeal-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotdeal-bot
  template:
    metadata:
      labels:
        app: hotdeal-bot
    spec:
      containers:
        - name: hotdeal-bot
          image: hotdeal-bot:latest
          imagePullPolicy: Never  # 로컬 이미지 사용 (OrbStack)
          envFrom:
            - configMapRef:
                name: hotdeal-bot-config
            - secretRef:
                name: hotdeal-bot-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Discord 봇은 HTTP 서버가 아니므로 헬스체크 제거
          # 대신 프로세스 상태로 확인
          # livenessProbe와 readinessProbe는 제거
